name: Trustabl

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: trustabl
        uses: trustabl/trustabl-action@feat/enrich
        with:
          target: "."
          enrich: true
          anthropic-key: ${{ secrets.ANTHROPIC_API_KEY }}
          auto-fix: true
          create-fix-pr: true
      - name: Echo outputs
        run: |
          echo "exit-code      = ${{ steps.trustabl.outputs.exit-code }}"
          echo "readiness-score = ${{ steps.trustabl.outputs.readiness-score }}"
          echo "risk-score     = ${{ steps.trustabl.outputs.risk-score }}"
          echo "max-severity   = ${{ steps.trustabl.outputs.max-severity }}"
          echo "findings-count = ${{ steps.trustabl.outputs.findings-count }}"
          echo "fix-pr-url     = ${{ steps.trustabl.outputs.fix-pr-url }}"
          ls -la trustabl.sarif trustabl.json
